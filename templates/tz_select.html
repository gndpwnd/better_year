<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Better Year</title>
      <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}"/>
   </head>
   <body id="everything">
      <a href="/"><img id="logo" src="{{url_for('static', filename='imgs/betteryear.webp')}}"/></a>
      <h1 id="title">{{ name }} | {{ dob }}</h1>
         <div class="tz-form-div">
            <p id="tz-form-desc">Please Select a Timezone<br>If unsure, refer to <a href="https://24timezones.com/timezone-map" target="_blank">this website</a>.<br> </p>
            <form class="tz-form" action="/" method="POST">
               <!-- make scrollable selections-->
               <select name="timezone" id="timezone" size="5">
                  <option value="-12">UTC -12</option>
                  <option value="-11">UTC -11</option>
                  <option value="-10">UTC -10</option>
                  <option value="-9">UTC -9</option>
                  <option value="-8">UTC -8</option>
                  <option value="-7">UTC -7</option>
                  <option value="-6">UTC -6</option>
                  <option value="-5">UTC -5</option>
                  <option value="-4">UTC -4</option>
                  <option value="-3">UTC -3</option>
                  <option value="-2">UTC -2</option>
                  <option value="-1">UTC -1</option>
                  <option value="0">UTC 0</option>
                  <option value="1">UTC +1</option>
                  <option value="2">UTC +2</option>
                  <option value="3">UTC +3</option>
                  <option value="4">UTC +4</option>
                  <option value="5">UTC +5</option>
                  <option value="6">UTC +6</option>
                  <option value="7">UTC +7</option>
                  <option value="8">UTC +8</option>
                  <option value="9">UTC +9</option>
                  <option value="10">UTC +10</option>
                  <option value="11">UTC +11</option>
                  <option value="12">UTC +12</option>
               </select>
               <input id="tz-submit" type="submit" value="submit">
            </form>
         </div>
   </body>
</html>
