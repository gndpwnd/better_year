<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Better Year</title>
      <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}"/>
   </head>
   <body id="everything">

      <a href="/"><img id="logo" src="{{url_for('static', filename='imgs/betteryear.webp')}}"/></a>
      <h1 id="title">Goals</h1>
      <!-- Display two lists side by side-->
      <div id="lists">
         <div id="list1">
            <h2 id="subtitle">Macro</h2>
            <ul>
               {% for goal in macro_goals %}
                  <li>{{goal}}</li>
               {% endfor %}
            </ul>
         </div>
         <div id="list2">
            <h2 id="subtitle">Micro</h2>
            <ul>
               {% for goal in micro_goals %}
                  <li>{{goal}}</li>
               {% endfor %}
            </ul>
         </div>
   </body>
</html>
