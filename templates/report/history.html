<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Better Year</title>
      <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}"/>
   </head>
   <body id="everything">
      <a href="/"><img id="logo" src="{{url_for('static', filename='imgs/betteryear.webp')}}"/></a>
        <h1 id="title">Reporting History</h1>
         {% for folder in folder_names %}
            <div class="report">
               <p>{{ folder }}</p>
               {% for report in reports %}
               {% if report[0] == folder %}
                  <p>{{ report[1][0] }}</p>
                  <p>{{ report[1][1] }}</p>
                  <p>View report <a href="{{ report[1][2] }}">here</a></p>
               {% endif %}
               {% endfor %}
            </div>
         {% endfor %}
   </body>
</html>
