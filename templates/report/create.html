<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Better Year</title>
      <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}"/>
      <link rel="stylesheet" href="{{url_for('static', filename='css/report.css')}}"/>
   </head>
   <body id="everything">
      <a href="/"><img id="logo" src="{{url_for('static', filename='imgs/betteryear.webp')}}"/></a>
      {% if data %}
      <h1 id="title">Edit Report</h1>
      
      {% else %}
      <p id="submit_url">{{ submission_url }}</p>

      <h1 id="title">Create a New Report</h1>
      
      <button id="clear-form">Clear This Form</button>

      <div class="report-form">

         <p class="report-category">Rate Today's Success</p>

         <form id="success-form" method="POST">
            <input name="success-rating" type="range" min="1" max="10" value="5" class="slider" id="success-rating">
         </form>

         <p class="report-category">-- Meals --</p>

         <form id="meal-form" method="POST">
            <p class="meal-form-title">#1</p>
            <p class="meal-form-subtitle">Rating</p>
            <input name="meal-rating" type="range" min="1" max="10" value="5" class="slider" id="meal-rating">
            <p class="meal-form-subtitle">Please Describe:</p>
            <textarea class="meal-form-desc" name="meal-form-desc" rows="4" cols="50"></textarea>
            <br>
            <button type="button" id="add-more-meals">+meal</button>
         </form>

         <p class="report-category">-- Workouts --</p>

         <form id="workout-form" method="POST">
            <p class="workout-form-title">#1</p>
            <p class="workout-form-subtitle">Rating</p>
            <input name="workout-rating" type="range" min="1" max="10" value="5" class="slider" id="workout-rating">
            <p class="workout-form-subtitle">Please Describe:</p>
            <textarea class="workout-form-desc" name="workout-form-desc" rows="4" cols="50"></textarea>
            <br>
            <button type="button" id="add-more-workouts">+workout</button>
         </form>

         <p class="report-category">-- Memories --</p>

         <form id="memory-form" method="POST">
            <p class="memory-form-title">#1</p>
            <p class="memory-form-subtitle">Subject:</p>
            <input class="memory-form-subject" type="text" name="memory-form-subject">
            <p class="memory-form-subtitle">Please Describe:</p>
            <textarea class="memory-form-desc" name="memory-form-desc" rows="4" cols="50"></textarea>
            <br>
            <button type="button" id="add-more-memories">+memory</button>
         </form>

         <p class="td-images">Any images?</p>
         <!-- if image is uploaded, add another slot to upload image-->
         <form id="image-form" method="POST">
            <p class="image-form-title">#1</p>
            <input type="file" id="img" name="img" accept="image/*">
            <label for="img">Upload image</label>
            <button type="button" id="add-more-images">+image</button>
         </form>

         <br>
         
         <!-- when click submit button, submit all forms-->
         
         <button type="submit" id="submit" >Submit</button>

         <script src="{{ url_for('static', filename='js/report_create.js') }}"></script>
         {% endif %}
      </div>
   </body>
</html>
